experiment:
  name: agent_run_1
  notes: "Workflow 1 baseline \u2014 human-prepared data, agent trains. No advanced\
    \ augmentations reserved for agent."
paths:
  data_dir: data/sample
  class_weights: data/class_weights.json
  class_mapping: data/class_mapping.json
  experiment_dir: experiments
  output_dir: experiments/run_1
model:
  backbone: efficientnet_b0
  pretrained: true
  checkpoint: null
  image_size: 224
  dropout: 0.3
training:
  epochs: 20
  batch_size: 32
  num_workers: 0
  mixed_precision: true
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  max_samples_per_class: null
optimizer:
  type: adamw
  lr: 0.0003
  weight_decay: 0.01
  momentum: 0.9
scheduler:
  type: cosine
  min_lr: 1.0e-06
  step_size: 7
  gamma: 0.1
  warmup_epochs: 0
loss:
  type: weighted_ce
  label_smoothing: 0.0
  focal_gamma: 2.0
  use_class_weights: true
sampler:
  use_weighted: true
augmentations:
  random_resized_crop: true
  random_horizontal_flip: true
  color_jitter: true
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.05
  random_erasing: false
  random_erasing_prob: 0.5
  mixup: false
  mixup_alpha: 0.4
  cutmix: false
  cutmix_alpha: 1.0
  randaugment: false
  randaugment_n: 2
  randaugment_m: 9
  autoaugment: false
