# ══════════════════════════════════════════════════════════════════════════
# SHARED — edit regardless of which workflow you run
# ══════════════════════════════════════════════════════════════════════════

agent:
  max_iterations: 2              # train→evaluate→improve cycles
  target_f1: 0.9                 # agent stops early when this macro F1 is reached
  llm_model: gpt-4o-mini         # options: gpt-4o, gpt-4o-mini, gpt-4-turbo

model:
  backbone: convnext_base.fb_in22k_ft_in1k  # options: efficientnet_b0/b2/b4, resnet50, convnext_tiny/small/base, vit_base_patch16_224, swin_tiny/small
  pretrained: true
  checkpoint: null               # path to .pth to warm-start (agent sets automatically)
  image_size: 224
  dropout: 0.3

training:
  epochs: 20
  batch_size: 32
  num_workers: 0                 # 0 = safe for WSL2; increase on Linux/Kaggle
  mixed_precision: true
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  max_samples_per_class: 100     # null = use all data

optimizer:
  type: adamw                    # options: adamw, adam, sgd
  lr: 0.0003
  weight_decay: 0.01
  momentum: 0.9                  # only used when type=sgd

scheduler:
  type: cosine                   # options: cosine, step, onecycle, plateau, none
  min_lr: 0.000001
  step_size: 7                   # only for type=step
  gamma: 0.1                     # only for type=step / plateau
  warmup_epochs: 0

loss:
  type: weighted_ce              # options: weighted_ce, focal
  label_smoothing: 0.0
  focal_gamma: 2.0               # only for type=focal
  use_class_weights: true

sampler:
  use_weighted: true

# Baseline augmentations — agent enables/tunes the rest during iterations
augmentations:
  random_resized_crop: true
  random_horizontal_flip: true
  color_jitter: true
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.05
  random_erasing: false
  random_erasing_prob: 0.5
  mixup: false
  mixup_alpha: 0.4
  cutmix: false
  cutmix_alpha: 1.0
  randaugment: false
  randaugment_n: 2
  randaugment_m: 9
  autoaugment: false


# ══════════════════════════════════════════════════════════════════════════
# WORKFLOW 1 — Human + Agent  →  python run_human_agent.py
# Edit paths below — you prepare the dataset, agent handles training.
# ══════════════════════════════════════════════════════════════════════════

paths:
  data_dir: data/sample          # folder with train/val/test/<class>/ structure
  class_weights: data/class_weights.json
  class_mapping: data/class_mapping.json
  experiment_dir: experiments


# ══════════════════════════════════════════════════════════════════════════
# WORKFLOW 2 — Full Agent  →  python run_full_agent.py
# Edit below — agent picks classes, prepares data, then trains.
# ══════════════════════════════════════════════════════════════════════════

data_prep:
  raw_data_dir: ../HM_Data/raw_data      # path to raw dataset (needs articles.csv + images/)
  max_train_per_class: 20        # null = use all images; e.g. 500 for faster runs
  instructions: null             # optional guidance, e.g. "prefer classes with >1000 images, exclude accessories"
