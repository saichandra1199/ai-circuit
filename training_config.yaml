experiment:
  name: baseline_efficientnet_b0
  notes: "Workflow baseline — human-prepared data, agent trains. No advanced augmentations reserved for agent."

agent:
  max_iterations: 2
  target_f1: 0.75
  # Full Agent Workflow only
  raw_data_dir: ../HM_Data/raw_data
  max_train_per_class: 50          # null = use all images; set e.g. 500 for faster runs

paths:
  data_dir: data/sample          
  class_weights: data/class_weights.json
  class_mapping: data/class_mapping.json
  experiment_dir: experiments

model:
  backbone: convnext_base.fb_in22k_ft_in1k  # IN-22k pretrained; options: any timm model — e.g. efficientnet_b0/b2/b4/b6, efficientnet_v2_s/m, resnet18/34/50/101, convnext_tiny/small/base, vit_small/base_patch16_224, swin_tiny/small, mobilenetv3_large_100, regnety_016/032
  pretrained: true               # ignored when checkpoint is set
  checkpoint: null               # path to .pth to warm-start from (agent sets this to best run's best_model.pth)
  image_size: 224
  dropout: 0.3

training:
  epochs: 20
  batch_size: 32
  num_workers: 0                 # 0 = safe default for WSL2; increase on Linux/Kaggle
  mixed_precision: true
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001
  max_samples_per_class: 100    # null = use full sample dataset

optimizer:
  type: adamw                    # options: adamw, adam, sgd
  lr: 0.0003
  weight_decay: 0.01
  momentum: 0.9                  # only used when type=sgd

scheduler:
  type: cosine                   # options: cosine, step, onecycle, plateau, none
  min_lr: 0.000001
  step_size: 7                   # only for type=step
  gamma: 0.1                     # only for type=step / plateau
  warmup_epochs: 0

loss:
  type: weighted_ce              # options: weighted_ce, focal
  label_smoothing: 0.0           # active when type=weighted_ce
  focal_gamma: 2.0               # only for type=focal
  use_class_weights: true

sampler:
  use_weighted: true             # WeightedRandomSampler for class imbalance

# Agent optimization targets — baseline has advanced augmentations off; agent enables/tunes these
augmentations:
  random_resized_crop: true
  random_horizontal_flip: true
  color_jitter: true
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.05
  random_erasing: false
  random_erasing_prob: 0.5
  mixup: false
  mixup_alpha: 0.4
  cutmix: false
  cutmix_alpha: 1.0
  randaugment: false
  randaugment_n: 2
  randaugment_m: 9
  autoaugment: false
